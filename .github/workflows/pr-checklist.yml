name: PR checklist

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]

jobs:
  checklist:
    name: checklist
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false && github.event.pull_request.user.login != 'dependabot[bot]'
    steps:
      - name: Detect docs-only PR
        id: docs_only
        uses: actions/github-script@v9
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 300,
            });
            const allDocs = files.data.length > 0 && files.data.every(f =>
              f.filename.endsWith('.md') ||
              f.filename.startsWith('docs/')
            );
            core.info(`PR touches ${files.data.length} files; docs_only=${allDocs}`);
            core.setOutput('value', allDocs ? 'true' : 'false');

      - name: Validate PR body
        if: steps.docs_only.outputs.value != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.pull_request.body || "";
            const problems = [];

            if (body.includes("<!-- Plain-English description of what this PR changes. -->")) {
              problems.push("Summary placeholder was not replaced with a plain-English description.");
            }

            const afterHeading = body.split(/^##\s+Self-review checklist\s*$/m)[1] || "";
            const section = afterHeading.split(/^##\s+/m)[0] || "";
            const total = (section.match(/^\s*-\s*\[[ xX]\]/gm) || []).length;
            const checked = (section.match(/^\s*-\s*\[[xX]\]/gm) || []).length;
            if (total > 0 && checked === 0) {
              problems.push(`Self-review checklist has ${total} items but none are ticked.`);
            }

            if (problems.length > 0) {
              core.warning("PR body hygiene warnings:\n- " + problems.join("\n- "));
            } else {
              core.info(`PR body OK. Checklist: ${checked}/${total} ticked. This check is advisory; CI/reviewers are the real gates.`);
            }

      - name: Paperwork audit
        if: steps.docs_only.outputs.value != 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 300,
            });
            const names = files.data.map(f => f.filename);
            const changed = new Set(names);

            const paperwork = new Set([
              "HANDOFF.md",
              "PROGRESS.md",
              "docs/ARCHITECTURE_MAP.md",
            ]);
            const durable = names.filter(name =>
              !paperwork.has(name) &&
              !name.startsWith("artifacts/") &&
              !name.endsWith(".csv") &&
              (
                name.startsWith("app/") ||
                name.startsWith("core/") ||
                name.startsWith("deploy/") ||
                name.startsWith("eas/") ||
                name.startsWith("ff/") ||
                name.startsWith("scripts/") ||
                name.startsWith("tests/") ||
                name.startsWith(".github/") ||
                name.startsWith(".claude/") ||
                ["CLAUDE.md", "README.md", "pyproject.toml", "requirements-web.txt", "run.py"].includes(name)
              )
            );
            if (durable.length === 0) {
              core.info("No durable code/tooling files changed; paperwork audit skipped.");
              return;
            }

            const problems = [];
            if (!changed.has("HANDOFF.md")) {
              problems.push("Durable files changed, but HANDOFF.md was not updated.");
            }
            if (!changed.has("PROGRESS.md")) {
              problems.push("Durable files changed, but PROGRESS.md was not updated.");
            }
            const mapSensitive = durable.some(name =>
              name.startsWith("scripts/") ||
              name.startsWith("app/") ||
              name.startsWith("core/") ||
              name.startsWith("ff/") ||
              name.startsWith("tests/") ||
              name.startsWith(".github/") ||
              name.startsWith(".claude/")
            );
            if (mapSensitive && !changed.has("docs/ARCHITECTURE_MAP.md")) {
              problems.push("Architecture-map-sensitive files changed, but docs/ARCHITECTURE_MAP.md was not updated.");
            }

            if (problems.length > 0) {
              core.setFailed("Paperwork audit failed:\n- " + problems.join("\n- "));
            } else {
              core.info("Paperwork audit passed. The agent updated the durable handoff/map paperwork.");
            }

      - name: Skip notice (docs-only)
        if: steps.docs_only.outputs.value == 'true'
        run: echo "Docs-only PR (only .md or docs/* files changed) - checklist gate skipped."
