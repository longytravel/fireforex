# ─── Fire Forex: per-(pair, timeframe) default knob ranges ─────────────
#
# Edit me. Values are "pips" as understood by Fire Forex:
#   • non-JPY pairs: 1 pip = 0.0001
#   • JPY pairs:     1 pip = 0.01   (handled by the harness — DO NOT rescale)
#
# Ranges scale geometrically with TF. GBP/USD and USD/JPY tend to move more
# than EUR/USD, AUD/USD, USD/CHF, NZD/USD → their pip ranges widen ~1.3–1.6×.
# sub_tf is always a finer timeframe available in the dataset.
#
# Shape per (pair, main_tf):
#   sub_tf:               <str>
#   fixed_sl_pips:        {min, max}
#   fixed_tp_pips:        {min, max}
#   rr_ratio:             {min, max}
#   atr_mult_sl:          {min, max}
#   atr_mult_tp:          {min, max}
#   trail_activation_pips:{min, max}
#   trail_atr_mult:       {min, max}
#   ema_fast:             {min, max}
#   ema_slow:             {min, max}

_default:
  sub_tf: M1
  fixed_sl_pips:         {min: 5,   max: 60}
  fixed_tp_pips:         {min: 8,   max: 100}
  rr_ratio:              {min: 0.5, max: 5.0}
  atr_mult_sl:           {min: 0.5, max: 4.0}
  atr_mult_tp:           {min: 0.5, max: 8.0}
  trail_activation_pips: {min: 5,   max: 80}
  trail_atr_mult:        {min: 0.3, max: 3.0}
  ema_fast:              {min: 5,   max: 30}
  ema_slow:              {min: 20,  max: 200}


