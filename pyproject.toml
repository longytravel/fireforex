[project]
name = "fire-forex-v0"
version = "0.1.0"
description = "Fire Forex v0 — stripped core loop (load, strategy, backtest, optimize)"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
    "vectorbt>=0.28.0,<0.29",
    "numpy>=1.26,<2.0",
    "pandas>=2.2,<3.0",
    "polars>=0.20",
    "pyarrow>=15.0",
    "numba>=0.59,<0.61",
    "optuna>=3.5",
    "tqdm>=4.66",
    "plotly>=5.20",
    "psutil>=5.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests"]
